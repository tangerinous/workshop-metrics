# Alertmanager configuration for metrics workshop
global:
  resolve_timeout: 5m

# Route configuration
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'console-logger'

# Receivers - logs alerts (visible in container logs and UI)
receivers:
  - name: 'console-logger'
    webhook_configs:
      - url: 'http://localhost:9093/-/healthy'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

